<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic metadata so the browser can render and scale the page correctly -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Browser tab title -->
  <title>NASA Space Explorer</title>

  <!-- Link the stylesheet that controls layout and design -->
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <!-- Main wrapper to keep content centered and readable -->
  <div class="container">
    <!-- Top branding area -->
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <!-- Filter controls: user picks start/end date, then requests images -->
    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button>Get Space Images</button>
    </div>

    <!-- Dynamic gallery where JavaScript inserts APOD image cards -->
    <div id="gallery" class="gallery">
      <!-- Default content shown before the first API response -->
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>

    <!--
      Reusable modal dialog for one selected APOD image.
      JavaScript fills these elements with title/date/explanation at runtime.
    -->
    <div id="imageModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-content">
        <!-- Close button for exiting the modal -->
        <button id="closeModalButton" class="modal-close" aria-label="Close image details">&times;</button>

        <!-- Selected image and its metadata -->
        <img id="modalImage" src="" alt="" />
        <h2 id="modalTitle"></h2>
        <p id="modalDate" class="modal-date"></p>
        <p id="modalExplanation" class="modal-explanation"></p>
      </div>
    </div>
  </div>

  <!-- Helper file for valid APOD date range setup -->
  <script src="js/dateRange.js"></script>

  <!-- Main app logic: fetch APOD data, render cards, and handle modal -->
  <script src="js/script.js"></script>
</body>
</html>
